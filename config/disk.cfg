#  Trunk — Disk image configuration

# --- Image -------------------------------------------------------------------
DISK_IMAGE        ="build/img/trunk.img"
DISK_SIZE         ="1G"

# --- Partition table ---------------------------------------------------------
DISK_TABLE        ="gpt"

# --- Partitions --------------------------------------------------------------
# Boot partition (FAT32, GRUB lives here)
BOOT_PART_NAME    ="TRUNK_BOOT"
BOOT_PART_START   ="1MiB"
BOOT_PART_END     ="256MiB"
BOOT_PART_FS      ="fat32"

# Root partition (ext2, kernel + future files)
ROOT_PART_NAME    ="TRUNK_ROOT"
ROOT_PART_START   ="256MiB"
ROOT_PART_END     ="100%"
ROOT_PART_FS      ="ext2"

# --- GRUB --------------------------------------------------------------------
GRUB_CFG_SRC      ="setup/grub/grub.cfg"
GRUB_TARGET       ="x86_64-efi"