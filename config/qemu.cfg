#  Trunk — QEMU launch configuration

# --- Binary ------------------------------------------------------------------
QEMU_BIN          ="qemu-system-x86_64"

# --- Machine -----------------------------------------------------------------
QEMU_MACHINE      ="q35"
QEMU_ACCEL_TCG    ="tcg"
QEMU_ACCEL_KVM    ="kvm"
QEMU_CPU_BASIC    ="qemu64"
QEMU_CPU_KVM      ="host"

# --- Resources ---------------------------------------------------------------
QEMU_RAM          ="2G"
QEMU_SMP_CORES    ="4"
QEMU_SMP_THREADS  ="1"

# --- Display -----------------------------------------------------------------
QEMU_DISPLAY      ="sdl"
QEMU_VGA          ="std"

# --- Serial ------------------------------------------------------------------
QEMU_SERIAL       ="stdio"

# --- Boot --------------------------------------------------------------------
QEMU_BOOT_ORDER   ="d"

# --- Artifacts ---------------------------------------------------------------
QEMU_ISO          ="build/iso/trunk.iso"
QEMU_DISK         ="build/img/trunk.img"
QEMU_LOG          ="build/logs/qemu"

# --- GDB ---------------------------------------------------------------------
QEMU_GDB_PORT     ="1234"

# --- Flags -------------------------------------------------------------------
QEMU_FLAGS_COMMON="-no-reboot"