#  Trunk — GRUB bootloader configuration
#  Supports: UEFI (primary) + BIOS (fallback)

set default=0

set timeout_style=hidden
set timeout=1

insmod part_gpt
insmod part_msdos
insmod fat
insmod ext2
insmod multiboot2
insmod all_video

if loadfont /boot/grub/fonts/unicode.pf2; then
    insmod gfxterm
    set gfxmode=auto
    terminal_output gfxterm
fi

menuentry "Trunk" {
    multiboot2 /boot/trunk.elf
    boot
}