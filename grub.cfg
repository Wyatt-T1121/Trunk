#  Trunk OS — GRUB2 Configuration
#  /boot/grub/grub.cfg

set default=0
set timeout=5

# Aesthetics
set menu_color_normal=white/black
set menu_color_highlight=black/white

insmod all_video
insmod gfxterm
terminal_output gfxterm

menuentry "Trunk OS" {
    insmod part_msdos
    insmod ext2

    multiboot2 /boot/trunk.elf
    boot
}

menuentry "Trunk OS (serial debug)" {
    insmod part_msdos
    insmod ext2

    multiboot2 /boot/trunk.elf trunk.serial=1
    boot
}

menuentry "Reboot" {
    reboot
}

menuentry "Power Off" {
    halt
}
