#  Trunk — GRUB bootloader configuration
#  Supports: UEFI (primary) + BIOS (fallback)
#
#  Boot layout:
#    trboot.elf    — physical boot stage, loaded by GRUB at 0x100000
#    troskern.elf  — higher-half kernel, loaded by GRUB as a module,
#                    parsed and mapped into virtual memory by trboot.elf

set default=0
set timeout=5

# UEFI + BIOS compatible modules
insmod part_gpt         # GPT partition support
insmod part_msdos       # MBR fallback support
insmod fat              # FAT32 (ESP)
insmod ext2             # ext2 root partition
insmod multiboot2       # Multiboot2 kernel loading
insmod all_video        # Video mode support

# Display
if loadfont /boot/grub/fonts/unicode.pf2; then
    insmod gfxterm
    set gfxmode=auto
    terminal_output gfxterm
fi

# Boot entries

menuentry "Trunk" {
    multiboot2 /boot/trboot.elf
    module2    /boot/troskern.elf
    boot
}

menuentry "Trunk (serial debug)" {
    multiboot2 /boot/trboot.elf trunk.serial=1 trunk.loglevel=debug
    module2    /boot/troskern.elf
    boot
}

menuentry "Reboot" {
    reboot
}

menuentry "Power Off" {
    halt
}